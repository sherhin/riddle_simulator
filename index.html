<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Осколки</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #1a1814; font-family: 'Georgia', serif;
        }
        body {
            display: flex; justify-content: center; align-items: flex-start;
            background: radial-gradient(ellipse at top, #2a2418 0%, #0f0e0a 100%);
            color: #d4c9a8;
        }
        #app-container {
            width: 100%; max-width: 640px; height: 100%;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 20px; background: transparent; position: relative;
        }
        .game-box {
            background: #2a261c; border: 2px solid #5e4e32; border-radius: 14px;
            padding: 20px; position: relative; display: flex; flex-direction: column; min-height: 100%;
        }
        h2 {
            margin: 0 0 10px 0; color: #d4af37; text-align: center;
        }
        .top-buttons {
            display: flex; justify-content: space-between; margin-bottom: 12px;
        }
        .top-buttons button {
            background: #4a3224; border: 1px solid #aa6644; color: #d4c9a8;
            font-size: 0.8em; padding: 6px 12px; border-radius: 6px;
            font-family: inherit; cursor: pointer;
        }
        .stats {
            background: #1e1b14; border: 1px solid #5e4e32; border-radius: 8px;
            padding: 10px; margin-bottom: 12px; display: grid;
            grid-template-columns: 1fr 1fr; gap: 6px; font-size: 0.95em;
        }
        .stat-line { display: flex; align-items: center; }
        .stat-line span { margin-left: 5px; font-weight: bold; }
        .bar-container {
            grid-column: span 2; height: 12px; background: #3a3224;
            border-radius: 6px; margin: 4px 0; overflow: hidden;
        }
        .bar-fill { height: 100%; }
        .sanity-fill { background: #7a9a7a; }
        .suspicion-fill { background: #aa6a4a; }

        button {
            background: #3a3224; border: 1px solid #6e5e42; color: #e0d6b0;
            padding: 8px 10px; margin: 3px; border-radius: 6px; cursor: pointer;
            font-family: inherit; font-size: 0.9em;
        }
        button:active { background: #5a4e36; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-kiss { background: #4a2a3a; border-color: #aa4466; }
        .btn-intimacy { background: #3a2a3a; border-color: #aa4466; }
        .btn-meds { background: #2a3a4a; border-color: #4466aa; }
        .btn-reading { background: #3a3a2a; border-color: #6a6a4a; }
        .btn-lullaby { background: #2a2a4a; border-color: #4a4a8a; }
        .btn-diary { background: #3a3a2a; border-color: #8a8a4a; }

        .event-log {
            background: #0d0c09; border: 1px solid #4e3e22; padding: 8px;
            height: 160px; overflow-y: auto; -webkit-overflow-scrolling: touch;
            font-style: italic; color: #b0a070; margin-top: 12px; font-size: 0.88em;
        }

        .warn {
            grid-column: span 2; color: #ff9966; font-size: 0.8em; margin-top: 4px;
        }
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; align-items: center;
            justify-content: center; z-index: 100; border-radius: 14px;
        }
        .modal-content {
            background: #2a261c; border: 2px solid #5e4e32; padding: 20px;
            border-radius: 12px; max-width: 480px; width: 90%; max-height: 80%;
            overflow-y: auto; -webkit-overflow-scrolling: touch; color: #d4c9a8;
        }
        .modal-content h3 { margin-top: 0; }
        .modal-content button { display: block; width: 100%; margin: 8px 0; }
    </style>
</head>
<body>
<div id="app-container">
    <div class="game-box" id="app">
        <h2>🐍 Симулятор Тома Реддла 🐍</h2>
        <div class="top-buttons">
            <button onclick="showTutorial()">❓ Как играть</button>
            <button onclick="restartGame()">🔄 Рестарт</button>
        </div>
        <div class="stats">
            <div class="stat-line">💷 Фунты: <span id="money">500</span></div>
            <div class="stat-line">📅 День: <span id="day">1</span> (<span id="actionsLeft">5</span> действ.)</div>
            <div class="stat-line">😌 Привязанность: <span id="happy">50</span>%</div>
            <div class="stat-line">😨 Страх: <span id="fear">70</span>%</div>
            <div class="stat-line" style="grid-column: span 2;">🧠 Ясность ума Тома:</div>
            <div class="bar-container"><div id="sanityFill" class="bar-fill sanity-fill" style="width:80%"></div></div>
            <div class="stat-line" style="grid-column: span 2;">🤫 Подозрительность Гарри:</div>
            <div class="bar-container"><div id="suspicionFill" class="bar-fill suspicion-fill" style="width:20%"></div></div>
            <div class="warn" id="warn"></div>
        </div>

        <div>
            <button onclick="act('toast')" id="btnToast">🥗 Десерт (-50£)</button>
            <button onclick="act('gift')" id="btnGift">🎁 Подарок (-40£)</button>
            <button onclick="act('music')" id="btnMusic">🎵 Музыка</button>
            <button class="btn-reading" onclick="act('reading')" id="btnReading">📖 Чтение (-20£)</button>
            <button onclick="act('walk')" id="btnWalk">🌲 Прогулка (-25£)</button>
            <button onclick="act('mask')" id="btnMask">🐍 Маска (+40£)</button>
            <button class="btn-kiss" onclick="act('kiss')" id="btnKiss">💋 Поцелуй</button>
            <button class="btn-intimacy" onclick="act('intimacy')" id="btnIntimacy" style="display:none;">🖤 Близость</button>
            <button class="btn-meds" onclick="act('meds')" id="btnMeds">💊 Таблетка (-20£)</button>
            <button class="btn-lullaby" onclick="act('lullaby')" id="btnLullaby">🎶 Колыбельная</button>
            <button class="btn-diary" onclick="act('diary')" id="btnDiary">📓 Дневник</button>
        </div>
        <div class="event-log" id="log"></div>
    </div>
</div>

<script>
    if (window.Telegram?.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }

    // ---------- ПЕРЕМЕННЫЕ ----------
    let money, happy, fear, day, gameOver, daysInDebt;
    let suspicion, sanity, kissBlocked;
    let unlockedIntimacy, intimacyUsedToday;
    let lullabyUsedToday;
    let daysWithoutDiary;
    let actionsLeft;
    const ACTIONS_PER_DAY = 5;
    const MAX = 100, MIN = 0;
    const SANITY_LOW = 25;

    function resetVars() {
        money = 500;
        happy = 50;
        fear = 70;
        day = 1;
        actionsLeft = ACTIONS_PER_DAY;
        gameOver = false;
        daysInDebt = 0;
        suspicion = 20;
        sanity = 80;
        kissBlocked = 0;
        unlockedIntimacy = false;
        intimacyUsedToday = false;
        lullabyUsedToday = false;
        daysWithoutDiary = 0;
    }

    function showTutorial() {
    showModal('📖 Как играть:',
        `<p><b>Ты — Том Реддл.</b> Гарри Поттер — твой пленник. Цель — чтобы он <b>сам захотел остаться</b> с тобой (идеальная концовка: страх 15–25%, привязанность ≥85%).</p>
        <p>Каждый день длится ровно <b>5 действий</b>. После пятого автоматически наступает новый день, начисляется доход (+60£), сбрасываются ежедневные лимиты.</p>
        <p><b>Основные показатели:</b></p>
        <ul>
            <li><b>Привязанность</b> – эмоциональная связь Гарри с Томом. Растёт от нежного поцелуя, джаза, «Томми Мирора», прогулки, близости при низком страхе. Падает от грубости, долгов, плохих книг и музыки.</li>
            <li><b>Страх</b> – удерживает Гарри от побега, но высокий страх ломает психику. Растёт от маски Волдеморта, резких поцелуев, Баха, «Грозового перевала», долгов, кошмаров. Снижается от подарков, прогулок, нежных поцелуев, колыбельной.</li>
            <li><b>Подозрительность</b> – скрытое недоверие Гарри. Растёт от однообразных действий, резких смен настроения, некоторых решений (разрешить письмо Джинни, разрешить разговор с Руди). При 95+ Гарри притворяется и внезапно сбегает.</li>
            <li><b>Ясность ума Тома</b> – ментальное здоровье Тома. Падает на 3 за любое действие, на 5 за колыбельную, на 10 за близость. Растёт от маски (+8) и таблеток (+25). При ясности <25 Том включает Баха и читает «Грозовой перевал». При 0 Том теряет контроль.</li>
        </ul>
        <p><b>Скрытые механики:</b> однообразие, резкие перепады страха, флешбеки, тёмный порыв.</p>
        <p><b>Случайные события (35%).</p>
        <p><b>События выбора (50% при смене дня)</p>
        <p>💡 <b>Совет:</b> маска даёт деньги и ясность, прогулки снижают страх, колыбельная успокаивает. Следи за ясностью и не повторяйся!</p>`,
        [{ label: 'Понял', action: ()=>{} }]
    );
}
    function showModal(title, html, options) {
        const gameBox = document.getElementById('app');
        const old = gameBox.querySelector('.modal-overlay');
        if (old) old.remove();
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        const content = document.createElement('div');
        content.className = 'modal-content';
        content.innerHTML = `<h3>${title}</h3>${html}`;
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.textContent = opt.label;
            btn.onclick = () => {
                opt.action();
                overlay.remove();
                updateUI();
                checkEnd();
            };
            content.appendChild(btn);
        });
        overlay.appendChild(content);
        gameBox.appendChild(overlay);
    }

    function endGame(msg) {
        if (gameOver) return;
        gameOver = true;
        document.querySelectorAll('#app button:not(.top-buttons button)').forEach(b => b.disabled = true);
        document.getElementById('log').innerHTML = '<div style="font-weight:bold; color:#d4af37; text-align:center; padding:10px;">' + msg + '</div>';
        document.getElementById('warn').textContent = '';
    }

    function checkEnd() {
        if (fear <= 10) { endGame('🚪 Гарри перестал бояться и этой ночью сбежал. (Концовка: «Побег»)'); return true; }
        if (fear >= 100 && happy < 20) { endGame('💔 Гарри полностью сломлен. (Концовка: «Сломанный Осколочек»)'); return true; }
        if (happy <= 5 && fear >= 80) { endGame('⚰️ В приступе отчаяния Гарри наносит себе вред. (Трагическая концовка)'); return true; }
        if (fear >= 15 && fear <= 25 && happy >= 85) { endGame('🕊️ Гарри сам подходит и тихо говорит: «Мне больше некуда идти». Вы вместе смотрите на закат. (Идеальная концовка: «Золотая клетка стала домом»)'); return true; }
        if (money < -150 || daysInDebt >= 3) { endGame('🏚️ Ты разорён. Особняк продан за долги. Гарри освобождён. (Концовка: «Банкротство»)'); return true; }
        if (suspicion >= 95) { endGame('🕵️ Гарри искусно притворялся послушным. Сегодня ты обнаружил, что он сбежал. (Концовка: «Обманный побег»)'); return true; }
        return false;
    }

    function log(text) {
        const logDiv = document.getElementById('log');
        const entry = document.createElement('div');
        entry.textContent = '> ' + text;
        logDiv.prepend(entry);
        while (logDiv.children.length > 6) logDiv.removeChild(logDiv.lastChild);
        logDiv.scrollTop = 0;
    }

    function updateUI() {
        document.getElementById('money').textContent = money;
        document.getElementById('happy').textContent = happy;
        document.getElementById('fear').textContent = fear;
        document.getElementById('day').textContent = day;
        document.getElementById('actionsLeft').textContent = actionsLeft;
        document.getElementById('sanityFill').style.width = sanity + '%';
        document.getElementById('suspicionFill').style.width = suspicion + '%';

        let warn = '';
        if (money < 0) warn += '💸 Долги! ';
        if (fear <= 15) warn += '⚠️ Страх низок — побег! ';
        else if (fear >= 90) warn += '⚠️ Страх критичен! ';
        if (sanity < 20) warn += '🧠 Том теряет контроль! ';
        if (suspicion >= 70) warn += '🤫 Гарри скрытен… ';
        if (daysWithoutDiary >= 5) warn += '📓 Гарри тоскует по дневнику! ';
        document.getElementById('warn').textContent = warn;

        const fearEl = document.getElementById('fear');
        fearEl.style.color = fear > 85 ? '#ff4444' : fear < 20 ? '#44ff44' : '#d4c9a8';

        document.getElementById('btnToast').disabled = money < 50;
        document.getElementById('btnGift').disabled = money < 40;
        document.getElementById('btnReading').disabled = money < 20;
        document.getElementById('btnWalk').disabled = money < 25;
        document.getElementById('btnMeds').disabled = money < 20 || sanity > 90;
        document.getElementById('btnKiss').disabled = kissBlocked > 0;
        document.getElementById('btnLullaby').disabled = lullabyUsedToday;
        document.getElementById('btnIntimacy').style.display = unlockedIntimacy ? 'inline-block' : 'none';
        if (unlockedIntimacy) {
            document.getElementById('btnIntimacy').disabled = intimacyUsedToday || sanity < 40 || kissBlocked > 0;
        }
    }

    let lastActions = [];
    function trackRepetition(type) {
        lastActions.push(type);
        if (lastActions.length > 3) lastActions.shift();
        if (lastActions.length === 3 && new Set(lastActions).size === 1) {
            suspicion = Math.min(100, suspicion + 8);
            log('🤫 Гарри замечает, что твои действия слишком однообразны. «Вечно тебе надо всё усложнить, Осколочек». Подозрительность растёт.');
        }
    }

    let prevFear = 70;
    function chooseFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function act(type) {
        if (gameOver) return;

        if (sanity <= 0 && type !== 'meds') {
            log('🌀 Том теряет контроль над собой! «Я — лорд Волдеморт в своём истинном обличье». Действие выбрано безумным порывом.');
            type = chooseFrom(['toast','gift','music','reading','walk','mask','kiss','lullaby','diary','intimacy']);
        }

        if (type !== 'meds') sanity = Math.max(0, sanity - 3);
        if (kissBlocked > 0) kissBlocked--;

        if (type === 'meds') {
            money -= 20;
            sanity = Math.min(100, sanity + 25);
            kissBlocked = 2;
            log('💊 Ты принимаешь таблетки. Мысли проясняются, но эмоции притуплены. Поцелуй временно недоступен.');
            advanceDay();
            return;
        }

        trackRepetition(type);

        switch(type) {
            case 'toast':
                money -= 50;
                {
                    const options = fear >= 50 ? [
                        { text: '🥗 Ты готовишь венские вафли с голубикой. Гарри пробует с опаской, но вкус немного отвлекает его от мрачных мыслей.', h: 10, f: -5, s: 3 },
                        { text: '🍰 Чизкейк с ягодами. Даже сквозь страх Гарри не может сдержать тихого вздоха удовольствия. «Надеюсь, папа с мамой с облачков не видят, какой я жалкий».', h: 12, f: -6, s: 2 }
                    ] : [
                        { text: '🥗 Венские вафли с голубикой. Гарри ест, но взгляд всё ещё колючий — он не доверяет твоей щедрости. «Я надеялся, что ты пойдешь со мной по своему желанию».', h: 14, f: -8, s: 2 },
                        { text: '🍰 Чизкейк с ягодами. Гарри почти улыбается, но вовремя одёргивает себя, словно напоминая, что он пленник.', h: 12, f: -10, s: 1 }
                    ];
                    const opt = chooseFrom(options);
                    happy = Math.min(MAX, happy + opt.h);
                    fear = Math.max(MIN, fear + opt.f);
                    suspicion += opt.s;
                    log(opt.text);
                }
                break;

            case 'gift':
                money -= 40;
                {
                    const items = fear >= 50 ? [
                        { name: '📖 «Томми Мирор»', fC: -12, sC: 6, txt: 'Ты протягиваешь Гарри потрёпанный экземпляр его любимой детской книги. Он недоверчиво берёт, но его пальцы дрожат.' },
                        { name: '📱 Телефон без сим-карты', fC: -8, sC: 8, txt: 'Ты даришь ему дорогой телефон, но без сим-карты. Гарри крутит его в руках и понимает — это очередная изящная насмешка над его положением.' },
                        { name: '🎨 Краски и холст', fC: -10, sC: 5, txt: 'Ты приносишь краски. Гарри принимает их молча, но в его глазах на мгновение вспыхивает интерес. Он вспоминает картины матери.' }
                    ] : [
                        { name: '📖 Новый «Томми Мирор»', fC: -18, sC: 4, txt: 'Ты даришь новое издание «Томми Мирора». Гарри благодарит почти искренне, и ты чувствуешь, как стена между вами истончается.' },
                        { name: '📱 Телефон без сим-карты', fC: -15, sC: 6, txt: 'Ты даёшь телефон. Гарри вертит его в руках, осознавая всю глубину своей зависимости от тебя. «В нём есть сим-карта? — Конечно, нет. Зачем она тебе?»' },
                        { name: '🎨 Краски и холст', fC: -16, sC: 5, txt: 'Гарри оживляется, рассматривая краски. Впервые за долгое время он заговаривает о живописи — ты знаешь, что он вспоминает мать.' }
                    ];
                    const choice = chooseFrom(items);
                    fear = Math.max(MIN, fear + choice.fC);
                    suspicion += choice.sC;
                    log('🎁 ' + choice.name + '. ' + choice.txt);
                }
                break;

            case 'music':
                if (sanity <= SANITY_LOW) {
                    const texts = [
                        '🎻 Из колонок льётся Бах. Гарри морщится — эта музыка кажется ему холодной и чужой, он нервно постукивает пальцами по столу.',
                        '🎻 Ты ставишь Баха. Гарри отворачивается к стене, явно раздражённый твоим выбором.'
                    ];
                    happy = Math.min(MAX, happy + 3);
                    fear = Math.min(MAX, fear + 12);
                    log(chooseFrom(texts) + ' (Бах не пришёлся по душе)');
                } else {
                    const texts = [
                        '🎷 Мягкий джаз заполняет комнату. Гарри прикрывает глаза, и ты видишь, как напряжение постепенно покидает его плечи.',
                        '🎷 Саксофон поёт грустную мелодию. Гарри едва заметно улыбается, погружаясь в воспоминания.'
                    ];
                    happy = Math.min(MAX, happy + 16);
                    fear = Math.min(MAX, fear + 3);
                    log(chooseFrom(texts));
                }
                break;

            case 'reading':
                money -= 20;
                if (sanity <= SANITY_LOW) {
                    const texts = [
                        '📖 Ты читаешь вслух «Грозовой перевал». Гарри замыкается в себе, отворачивается к стене и мечтает только о том, чтобы этот вечер закончился. «Да вы с Хитклиффом братья по ебанце, Том».',
                        '📖 Мрачные страницы «Грозового перевала» угнетают Гарри. Он вздыхает и закрывает глаза, пытаясь отгородиться от твоего голоса.'
                    ];
                    happy = Math.max(MIN, happy - 5);
                    fear = Math.min(MAX, fear + 10);
                    suspicion += 2;
                    log(chooseFrom(texts) + ' (Книга выбрана неудачно)');
                } else {
                    const texts = [
                        '📖 Ты читаешь «Томми Мирор». Гарри слушает с тёплой улыбкой, вспоминая детство в приюте.',
                        '📖 Приключения Томми Мирора вызывают у Гарри давно забытые эмоции. Он даже задаёт вопрос — впервые за долгое время.'
                    ];
                    happy = Math.min(MAX, happy + 14);
                    fear = Math.max(MIN, fear - 5);
                    suspicion += 1;
                    log(chooseFrom(texts));
                }
                break;

            case 'mask':
                money += 40;
                {
                    const phrases = [
                        '🐍 Ты надеваешь маску Волдеморта. «Я вернул тебя, Осколочек». Гарри вжимается в стену, его глаза полны ужаса. «Пожалуйста, Том, не надо…»',
                        '🐍 Ты шипишь сквозь маску: «Ты никогда не сбежишь». Гарри дрожит, но покорно кивает.',
                        '🐍 Тёмный Лорд смотрит на него. «Ты — моя душа». Гарри закрывает лицо руками, пытаясь спрятаться от этого взгляда.'
                    ];
                    fear = Math.min(MAX, fear + 20);
                    happy = Math.max(MIN, happy - 5);
                    suspicion = Math.max(0, suspicion - 10);
                    sanity = Math.min(100, sanity + 8);
                    log(chooseFrom(phrases) + ' (+40£)');
                }
                break;

            case 'walk':
                money -= 25;
                {
                    const walks = fear >= 50 ? [
                        { text: '🌲 Вы выходите на прогулку. Прохладный ветер ерошит волосы. Гарри ёжится, но глубоко вдыхает свежий воздух. «Если я не выйду на улицу, я вздернусь на турнике».', fC: -8, hC: 6 },
                        { text: '🌲 Моросит дождь. Ты держишь зонт, и Гарри вынужден идти рядом. Его шаги постепенно становятся увереннее.', fC: -10, hC: 5 }
                    ] : [
                        { text: '🌲 Солнечная прогулка у древнего дуба. Гарри шутит, он в хорошем настроении. «Мы вместе, и никто нам больше не помешает».', fC: -12, hC: 8 },
                        { text: '🌲 Вы идёте к ручью. Гарри наклоняется к воде, и ты чувствуешь его минутное умиротворение.', fC: -14, hC: 8 }
                    ];
                    const w = chooseFrom(walks);
                    fear = Math.max(MIN, fear + w.fC);
                    happy = Math.min(MAX, happy + w.hC);
                    suspicion += 3;
                    log(w.text);
                }
                break;

            case 'kiss':
                if (fear < 50) {
                    const soft = [
                        { text: '💋 Ты нежно целуешь его в лоб. Гарри закрывает глаза и на мгновение расслабляется, но ты чувствуешь, что он всё ещё настороже. «Тебе нечего бояться, Осколочек. Если только ты ничего от меня не скрываешь».', h: 16, f: -6, s: 4 },
                        { text: '💋 Ты целуешь его в щёку. Гарри краснеет и отводит взгляд, но не отстраняется.', h: 14, f: -5, s: 3 }
                    ];
                    const s = chooseFrom(soft);
                    happy = Math.min(MAX, happy + s.h);
                    fear = Math.max(MIN, fear + s.f);
                    suspicion += s.s;
                    log(s.text);
                } else {
                    const hard = [
                        { text: '💋 Ты резко притягиваешь его и целуешь. Гарри вырывается, кричит от ужаса и забивается в угол. «Не вздумай так больше делать, чертов ты Дамер!»', f: 15, h: -5, s: -5 },
                        { text: '💋 Ты пытаешься поцеловать его, но Гарри замирает как статуя, а потом начинает дрожать, не в силах сопротивляться.', f: 15, h: -5, s: -5 }
                    ];
                    const h = chooseFrom(hard);
                    fear = Math.min(MAX, fear + h.f);
                    happy = Math.max(MIN, happy + h.h);
                    suspicion = Math.max(0, suspicion + h.s);
                    log(h.text);
                }
                if (!unlockedIntimacy) {
                    unlockedIntimacy = true;
                    log('🖤 Гарри напряжён, но теперь ты можешь попробовать… большее. Открыта кнопка «Близость».');
                }
                break;

            case 'lullaby':
                if (lullabyUsedToday) return;
                lullabyUsedToday = true;
                sanity = Math.max(0, sanity - 5);
                if (sanity > SANITY_LOW && fear < 50) {
                    fear = Math.max(MIN, fear - 15);
                    happy = Math.min(MAX, happy + 10);
                    log('🎶 Ты поёшь старую балладу. «Без косточек черешню любимой я принес…» Гарри закрывает глаза и впервые за долгое время засыпает спокойно.');
                } else {
                    fear = Math.min(MAX, fear + 10);
                    happy = Math.max(MIN, happy - 3);
                    log('🎶 Ты начинаешь колыбельную, но голос срывается на шипение. Гарри вздрагивает и отодвигается. «Это ничего не значит. Ты все равно тут не выживешь».');
                }
                break;

            case 'intimacy':
                if (!unlockedIntimacy || intimacyUsedToday) return;
                if (sanity < 40 || kissBlocked > 0) return;
                intimacyUsedToday = true;
                sanity = Math.max(0, sanity - 10);
                kissBlocked = 2;
                if (fear < 40) {
                    happy = Math.min(MAX, happy + 18);
                    fear = Math.max(MIN, fear - 8);
                    suspicion = Math.min(100, suspicion + 10);
                    log('🖤 Ты притягиваешь его ближе. Гарри поддаётся, но ты видишь в его глазах понимание — это очередная манипуляция.');
                } else {
                    fear = Math.min(MAX, fear + 20);
                    happy = Math.max(MIN, happy - 10);
                    suspicion = Math.max(0, suspicion - 10);
                    log('🖤 Ты требуешь близости. Гарри замирает, а потом дрожит, не в силах сопротивляться. «Я не насиловал тебя. Ты получил удовольствие. И не особо-то сопротивлялся».');
                }
                if (happy > 85 && fear < 25 && Math.random() < 0.3) {
                    showModal('Тёмный порыв',
                        'Близость разбудила в тебе желание причинить боль. Поддаться?',
                        [
                            { label: 'Сопротивляться (-15 Ясности)', action: ()=>{
                                sanity = Math.max(0, sanity - 15);
                                log('🧠 Ты сдержался. «Я никогда не причиню тебе вреда».');
                            }},
                            { label: 'Поддаться (сорвать концовку)', action: ()=>{
                                fear = Math.min(MAX, fear + 30);
                                happy = Math.max(MIN, happy - 20);
                                log('💔 Ты сделал ему больно. Гарри отшатывается, в глазах — недоверие и ужас. «Если ты убьешь меня, то никогда отсюда не выйдешь».');
                                checkEnd();
                            }}
                        ]
                    );
                    updateUI();
                    return;
                }
                break;

            case 'diary':
                {
                    const react = (choice) => {
                        daysWithoutDiary = 0;
                        if (choice === 'burn') {
                            fear = Math.min(MAX, fear + 10);
                            suspicion = Math.max(0, suspicion - 10);
                            log('📓 Ты сжигаешь его записи на его глазах. Гарри молчит, но страх усиливается. «Он раз за разом уничтожает все мои записки, шут знает зачем».');
                        } else if (choice === 'cold') {
                            happy = Math.max(MIN, happy - 3);
                            log('📓 Ты холодно комментируешь прочитанное. Гарри замыкается.');
                        } else if (choice === 'praise') {
                            happy = Math.min(MAX, happy + 8);
                            suspicion = Math.min(100, suspicion + 6);
                            log('📓 Ты хвалишь его за честность. Гарри озадачен, но привязанность немного растёт.');
                        }
                    };
                    showModal('📓 Дневник Гарри',
                        '«Итак, меня зовут Гарри Поттер, мне двадцать пять лет…» Он исписал несколько страниц. Твоя реакция?',
                        [
                            { label: 'Сжечь записи (+10 страх, -10 подозрение)', action: ()=>{ react('burn'); } },
                            { label: 'Холодно прокомментировать (-3 привяз.)', action: ()=>{ react('cold'); } },
                            { label: 'Похвалить (+8 привяз., +6 подозрение)', action: ()=>{ react('praise'); } }
                        ]
                );
                updateUI();
                return;
                }
        }

        if (Math.abs(fear - prevFear) > 15) {
            suspicion = Math.min(100, suspicion + 5);
            log('📈 Резкая смена твоего поведения настораживает Гарри. «Ты меня пугаешь». Подозрительность растёт.');
        }
        prevFear = fear;

        if (Math.random() < 0.08) {
            const fb = chooseFrom(['Джинни', 'детство в приюте', 'Волдеморт']);
            if (sanity <= SANITY_LOW) {
                fear = Math.min(MAX, fear + 15);
                happy = Math.max(MIN, happy - 10);
                log('💭 Внезапное воспоминание о ' + fb + ' захлёстывает Гарри. Он вздрагивает, лицо искажается болью. «Мои родители погибли в автокатастрофе…');
            } else {
                happy = Math.min(MAX, happy + 5);
                log('💭 Гарри на мгновение задумывается, вспоминая ' + fb + '. Ты чувствуешь лёгкую перемену в его настроении.');
            }
        }

        checkDebt();
        triggerRandomEvent();

        if (happy > 90 && fear < 20 && Math.random() < 0.4) {
            showModal('Тёмный порыв',
                'Привязанность Гарри так высока, а страх почти исчез. Ты чувствуешь желание проверить его верность — причинить боль, чтобы убедиться, что он действительно твой.',
                [
                    { label: 'Сопротивляться (-15 Ясности)', action: ()=>{
                        sanity = Math.max(0, sanity - 15);
                        log('🧠 Ты борешься с собой. Ясность падает, но Гарри в безопасности.');
                    }},
                    { label: 'Поддаться (сорвать концовку)', action: ()=>{
                        fear = Math.min(MAX, fear + 30);
                        happy = Math.max(MIN, happy - 20);
                        log('💔 Ты сделал ему больно. Гарри отшатывается, в глазах — недоверие и ужас. Привязанность рухнула.');
                        checkEnd();
                    }}
                ]
            );
            updateUI();
            return;
        }

        advanceDay();
    }

    function advanceDay() {
        actionsLeft--;
        if (actionsLeft <= 0) {
            day++;
            actionsLeft = ACTIONS_PER_DAY;
            money += 60;
            lullabyUsedToday = false;
            intimacyUsedToday = false;
            daysWithoutDiary++;
            if (daysWithoutDiary >= 5) {
                happy = Math.max(MIN, happy - 2);
                fear = Math.min(MAX, fear + 3);
                log('📓 Гарри уже несколько дней не брал в руки дневник. Его тревожность растёт.');
            }
            log('🌅 Наступает новый день (' + day + '). Ты получаешь небольшой доход (+60£). «Хороший день. Ведь сегодня ровно три месяца, как мы с Осколочком вместе».');
            if (Math.random() < 0.5) modalChoice();
        }
        updateUI();
        checkEnd();
    }

    function checkDebt() {
        if (money < 0) {
            daysInDebt++;
            happy = Math.max(MIN, happy - 5);
            fear = Math.min(MAX, fear + 7);
            log('💸 У тебя долги! Гарри не получает достаточно еды. Привязанность падает, страх растёт.');
            if (daysInDebt >= 3 || money < -150) endGame('🏚️ Ты разорён. Особняк продан за долги. Гарри освобождён.');
        } else {
            daysInDebt = 0;
        }
    }

    function triggerRandomEvent() {
        if (Math.random() < 0.35) {
            const r = Math.random();
            if (r < 0.25) {
                happy = Math.max(MIN, happy - 10);
                fear = Math.min(MAX, fear + 12);
                log('😱 Ночные кошмары. Гарри просыпается в холодном поту, бормоча что-то о стенах.');
            } else if (r < 0.50) {
                money -= 55;
                log('🚚 Приезжает курьер с кормом для змей. Ты вынужден заплатить (-55£). «Всего лишь мыши, для змей. Пойдем, Осколочек».');
            } else if (r < 0.65) {
                happy = Math.min(MAX, happy + 8);
                log('📖 Вечернее чтение само собой получилось удачным. Гарри засыпает спокойно.');
            } else if (r < 0.80) {
                suspicion = Math.min(100, suspicion + 10);
                log('🗣️ Гарри пытается заговорить о прошлом. Ты чувствуешь, что он проверяет границы.');
            } else {
                fear = Math.min(MAX, fear + 15);
                log('🐍 Одна из змей выбралась из террариума. Гарри в панике, пока ты не находишь её в его постели. «Нагайна не тронет тебя. Я приказал ей».');
            }
        }
    }

    function modalChoice() {
        if (gameOver) return;
        const scenarios = [
            {
                title: 'Письмо Джинни',
                text: 'Гарри просит разрешения написать письмо жене. Он хочет объяснить, что ушёл добровольно.',
                options: [
                    { label: 'Разрешить (−25 Страх, +20 Подозрение)', action: ()=>{
                        fear = Math.max(MIN, fear - 25);
                        suspicion = Math.min(100, suspicion + 20);
                        log('📝 Ты позволяешь написать письмо. Гарри выводит слова дрожащей рукой, но ты чувствуешь подвох.');
                    }},
                    { label: 'Запретить (+10 Страх, −8 Привяз.)', action: ()=>{
                        fear = Math.min(MAX, fear + 10);
                        happy = Math.max(MIN, happy - 8);
                        log('❌ Ты рвёшь бумагу. Гарри молча отводит взгляд.');
                    }}
                ]
            },
            {
                title: 'Болезнь змеи',
                text: 'Нагайна больна. Лечение дорого, но её смерть может вывести Тома из равновесия.',
                options: [
                    { label: 'Лечить (−80£, +15 Ясность)', action: ()=>{
                        money -= 80;
                        sanity = Math.min(100, sanity + 15);
                        log('🏥 Ты оплачиваешь ветеринара. Нагайна спасена, и Том успокаивается.');
                    }},
                    { label: 'Усыпить (−15 Ясность, +10 Страх)', action: ()=>{
                        sanity = Math.max(0, sanity - 15);
                        fear = Math.min(MAX, fear + 10);
                        log('💀 Ты усыпляешь Нагайну. Гарри в ужасе от твоей жестокости.');
                    }}
                ]
            },
            {
                title: 'Визит Руди',
                text: 'Приехал Лестрейндж по юридическим делам. Гарри просит разрешения поговорить с ним.',
                options: [
                    { label: 'Разрешить (−5 Страх, +20 Подозрение)', action: ()=>{
                        fear = Math.max(MIN, fear - 5);
                        suspicion = Math.min(100, suspicion + 20);
                        log('🗣️ Ты позволяешь Гарри поговорить с Руди. Краем уха слышишь, как он умоляет вызвать полицию. Подозрительность взлетает.');
                    }},
                    { label: 'Запретить (+10 Страх, −8 Привяз.)', action: ()=>{
                        fear = Math.min(MAX, fear + 10);
                        happy = Math.max(MIN, happy - 8);
                        log('🚫 Ты запрещаешь разговор. Гарри смотрит с отчаянием и отворачивается.');
                    }}
                ]
            },
            {
                title: 'Попытка массажа',
                text: 'Том предлагает расслабляющий массаж. Гарри напрягается, вспоминая прошлый опыт.',
                options: [
                    { label: 'Принудить (+12 Привяз., +5 Страх, +10 Ясность, −10£)', action: ()=>{
                        money -= 10;
                        sanity = Math.min(100, sanity + 10);
                        happy = Math.min(MAX, happy + 12);
                        fear = Math.min(MAX, fear + 5);
                        suspicion = Math.min(100, suspicion + 5);
                        log('💆 Ты делаешь массаж. Гарри расслабляется помимо воли, но страх не уходит полностью.');
                    }},
                    { label: 'Позволить отказаться (+15 Страх, −5 Привяз., −15 Ясность)', action: ()=>{
                        sanity = Math.max(0, sanity - 15);
                        fear = Math.min(MAX, fear + 15);
                        happy = Math.max(MIN, happy - 5);
                        log('😠 Ты в ярости от отказа. Гарри сжимается, ожидая наказания.');
                    }}
                ]
            }
        ];
        const scenario = scenarios[Math.floor(Math.random() * scenarios.length)];
        showModal(scenario.title, scenario.text, scenario.options);
    }

    function restartGame() {
        resetVars();
        document.getElementById('log').innerHTML = '';
        document.querySelectorAll('#app button:not(.top-buttons button)').forEach(b => b.disabled = false);
        document.getElementById('fear').style.color = '#d4c9a8';
        document.getElementById('warn').textContent = '';
        lastActions = [];
        prevFear = 70;
        log('🕯️ Ты приносишь завтрак. Гарри молча ковыряет глазунью, ожидая нового дня.');
        updateUI();
    }

    resetVars();
    lastActions = [];
    prevFear = 70;
    log('🕯️ Ты приносишь завтрак. Гарри молча ковыряет глазунью, ожидая нового дня.');
    updateUI();

    setTimeout(showTutorial, 600);
</script>
</body>
</html>
